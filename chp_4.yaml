q1: "What are the two key network-layer functions?"
a1: "Forwarding and routing."
q2: "What is forwarding?"
a2: "Moving a packet from a router’s input port to the appropriate output port."
q3: "What is routing?"
a3: "Determining the path packets take from source to destination."
q4: "What is the difference between the data plane and control plane?"
a4: "The data plane is local and handles forwarding at each router, while the control plane is network-wide and determines routes between source and destination."
q5: "What are the two control-plane approaches mentioned in the notes?"
a5: "Traditional routing algorithms in routers, and SDN using remote servers/controllers."
q6: "In a per-router control plane, where does the routing algorithm run?"
a6: "In each router."
q7: "In a logically centralized control plane, what computes and distributes forwarding behavior?"
a7: "A remote or logically centralized controller."
q8: "What are the main parts of a router architecture?"
a8: "Input ports, switching fabric, output ports, and routing processor."
q9: "Which part of a router usually operates in nanoseconds?"
a9: "The forwarding data plane hardware."
q10: "Which part of a router usually operates in milliseconds?"
a10: "The control plane software, including routing and management."
q11: "What happens at an input port?"
a11: "Line termination, link-layer receive processing, lookup/forwarding, and possibly queueing."
q12: "What is decentralized switching?"
a12: "When input ports use local forwarding-table copies to determine the output port."
q13: "What is destination-based forwarding?"
a13: "Forwarding based only on the destination IP address."
q14: "What is generalized forwarding?"
a14: "Forwarding based on any set of header field values, not just destination address."
q15: "What is longest prefix matching?"
a15: "Choosing the forwarding-table entry with the longest matching address prefix for the destination IP."
q16: "Why is longest prefix matching needed?"
a16: "Because multiple forwarding entries may match a destination address, and the most specific one should be used."
q17: "What is the job of the switching fabric?"
a17: "To transfer packets from input buffers to the correct output buffers."
q18: "What are the three types of switching fabric?"
a18: "Memory, bus, and crossbar."
q19: "Why do output ports need buffers?"
a19: "Because packets may arrive from the switching fabric faster than they can be transmitted."
q20: "What does the scheduling discipline at an output port do?"
a20: "It chooses which queued datagram gets transmitted next."
q21: "What can happen if a router is congested and lacks buffers?"
a21: "Packets can be lost."
q22: "What is the rule of thumb for buffering size?"
a22: "Buffering should be about RTT × link capacity, also called the delay-bandwidth product."
q23: "What protocols are part of the Internet network layer in these notes?"
a23: "IP, ICMP, and routing protocols such as OSPF and BGP."
q24: "What does the IP protocol provide?"
a24: "Addressing conventions, datagram format, and packet-handling conventions."
q25: "What does ICMP mainly provide?"
a25: "Error reporting and router signaling."
q26: "What field in the IPv4 header prevents packets from looping forever?"
a26: "Time To Live (TTL)."
q27: "What happens to TTL at each router hop?"
a27: "It is decremented."
q28: "What is the purpose of the IPv4 header checksum?"
a28: "To detect errors in the IP header."
q29: "What is fragmentation?"
a29: "Splitting a large IP datagram into smaller datagrams so it can pass over links with smaller MTUs."
q30: "What is MTU?"
a30: "Maximum Transmission Unit, the largest link-layer frame size a link can carry."
q31: "Where is an IP datagram reassembled?"
a31: "Only at the final destination."
q32: "What identifies related fragments of the same original datagram?"
a32: "IP header fields such as the identifier, flags, and fragment offset."
q33: "What is an IP address?"
a33: "A 32-bit identifier for a host or router interface in IPv4."
q34: "Are IP addresses assigned to devices or interfaces?"
a34: "Interfaces."
q35: "What is a subnet?"
a35: "A set of interfaces with the same subnet part of their IP address that can reach one another without an intervening router."
q36: "In an IP address, which bits are the subnet part?"
a36: "The high-order bits."
q37: "In an IP address, which bits are the host part?"
a37: "The low-order bits."
q38: "What does /24 mean in CIDR notation?"
a38: "The first 24 bits are the subnet portion."
q39: "What does CIDR stand for?"
a39: "Classless InterDomain Routing."
q40: "What is the advantage of CIDR?"
a40: "The subnet portion can have arbitrary length."
q41: "How can a host get its IP address?"
a41: "Either manually configured or dynamically through DHCP."
q42: "What does DHCP stand for?"
a42: "Dynamic Host Configuration Protocol."
q43: "What is the main purpose of DHCP?"
a43: "To dynamically assign IP configuration information to hosts."
q44: "Besides an IP address, what else can DHCP provide?"
a44: "The first-hop router address, DNS server address, and subnet mask."
q45: "What transport protocol does DHCP use?"
a45: "UDP."
q46: "Why is a DHCP request often broadcast on the LAN?"
a46: "Because the host initially does not know the DHCP server’s address."
q47: "How does a network get its subnet block?"
a47: "It gets allocated a portion of its ISP’s address space."
q48: "How does an ISP get address blocks?"
a48: "From ICANN."
q49: "What does NAT stand for?"
a49: "Network Address Translation."
q50: "What is the main idea of NAT?"
a50: "Many devices in a local network share one public IP address when communicating with the Internet."
q51: "What addresses do hosts inside a NAT network commonly use?"
a51: "Private local addresses, such as 10.0.0.0/24."
q52: "How does NAT distinguish traffic from different internal hosts using one public IP?"
a52: "By using different source port numbers."
q53: "What does a NAT translation table map?"
a53: "WAN-side public IP/port pairs to LAN-side private IP/port pairs."
q54: "Give one advantage of NAT."
a54: "It reduces the number of public IP addresses needed."
q55: "Give another advantage of NAT."
a55: "Internal device addresses can change without affecting the outside world."
q56: "Why can NAT provide a security benefit?"
a56: "Internal devices are not directly addressable from the outside by default."
q57: "What was the initial main motivation for IPv6?"
a57: "IPv4’s 32-bit address space was running out."
q58: "How long is an IPv6 address?"
a58: "128 bits."
q59: "How large is the fixed IPv6 header?"
a59: "40 bytes."
q60: "Why was the IPv6 header simplified?"
a60: "To speed up processing and forwarding."
q61: "Does IPv6 allow fragmentation by routers?"
a61: "No."
q62: "Why was the checksum removed from IPv6?"
a62: "To reduce per-hop processing time."
q63: "What is tunneling in the IPv4-to-IPv6 transition?"
a63: "Carrying an IPv6 datagram as the payload inside an IPv4 datagram across IPv4 routers."
q64: "Why is tunneling needed during transition to IPv6?"
a64: "Because not all routers can be upgraded to IPv6 at the same time."
q65: "In SDN/generalized forwarding, what is stored in each router?"
a65: "A flow table."
q66: "Who computes and distributes the flow table in SDN?"
a66: "A logically centralized routing controller."
q67: "In OpenFlow, how is a flow defined?"
a67: "By packet header fields."
q68: "What are the two core parts of an OpenFlow rule?"
a68: "A pattern to match and an action to apply."
q69: "What actions can an OpenFlow rule take?"
a69: "Drop, forward, modify, or send the packet to the controller."
q70: "What does the wildcard * mean in an OpenFlow-style rule?"
a70: "Any value in that field."